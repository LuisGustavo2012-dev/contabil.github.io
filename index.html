<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCDPR Digital — Livro Caixa Digital do Produtor Rural</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f0f4f8;
  --sidebar: #0f2137;
  --sidebar-hover: #1a3550;
  --sidebar-active: #1e90ff;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1a202c;
  --text2: #4a5568;
  --text3: #718096;
  --primary: #1e90ff;
  --primary-dark: #1565c0;
  --success: #16a34a;
  --danger: #dc2626;
  --warning: #d97706;
  --info: #0891b2;
  --input-bg: #f8fafc;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:14px}
a{color:var(--primary);text-decoration:none}

/* SIDEBAR */
#sidebar{width:240px;min-width:240px;background:var(--sidebar);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo h1{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.3px}
.sidebar-logo span{color:rgba(255,255,255,0.45);font-size:11px;display:block;margin-top:2px}
.sidebar-menu{flex:1;overflow-y:auto;padding:12px 0}
.menu-section{color:rgba(255,255,255,0.3);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:12px 20px 6px}
.menu-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:rgba(255,255,255,0.65);cursor:pointer;transition:all .15s;border-left:3px solid transparent;font-size:13px}
.menu-item:hover{background:var(--sidebar-hover);color:#fff}
.menu-item.active{background:rgba(30,144,255,0.15);color:var(--sidebar-active);border-left-color:var(--sidebar-active)}
.menu-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08)}
.sidebar-footer small{color:rgba(255,255,255,0.3);font-size:10px}

/* MAIN */
#main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:17px;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.badge-year{background:#e8f4ff;color:var(--primary);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
#content{padding:28px;flex:1}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-card .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px}
.stat-card .value{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.stat-card .sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-card.green .value{color:var(--success)}
.stat-card.red .value{color:var(--danger)}
.stat-card.blue .value{color:var(--primary)}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:28px}
.chart-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.chart-card h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
.chart-wrap{position:relative;height:220px}

/* TABLE */
.table-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.table-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.table-header h3{font-size:14px;font-weight:700}
.table-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:6px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px}
.search-box input{border:none;background:none;font-size:13px;color:var(--text);width:160px;outline:none}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;color:var(--text3);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--primary)}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;color:var(--text);vertical-align:middle}
tr:hover td{background:#fafcff}
tr:last-child td{border-bottom:none}
.tfoot-row td{background:#f8fafc;font-weight:700;color:var(--text);border-top:2px solid var(--border)}
.receita-val{color:var(--success);font-weight:700}
.despesa-val{color:var(--danger);font-weight:700}
.saldo-pos{color:var(--success);font-weight:700}
.saldo-neg{color:var(--danger);font-weight:700}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-warning{background:var(--warning);color:#fff}
.btn-warning:hover{background:#b45309}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:#f8fafc;border-color:var(--primary);color:var(--primary)}
.btn-ghost{background:none;color:var(--text2);border:none;padding:6px 8px}
.btn-ghost:hover{background:#f1f5f9;color:var(--danger)}
.btn-sm{padding:5px 10px;font-size:12px}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-control{border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;color:var(--text);background:var(--input-bg);transition:border .15s;width:100%;font-family:inherit}
.form-control:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(30,144,255,0.1)}
textarea.form-control{resize:vertical;min-height:72px}
select.form-control{cursor:pointer}
.form-section{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:20px}
.form-section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700}
.badge-normal{background:#e8f5e9;color:#2e7d32}
.badge-p{background:#fff3e0;color:#e65100}
.badge-receita{background:#dcfce7;color:#15803d}
.badge-despesa{background:#fee2e2;color:#b91c1c}
.badge-adiantamento{background:#ede9fe;color:#7c3aed}

/* PAGINATION */
.pagination{display:flex;align-items:center;gap:4px;padding:12px 20px;border-top:1px solid var(--border)}
.page-btn{border:1px solid var(--border);background:#fff;color:var(--text);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.page-btn:hover,.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-info{font-size:12px;color:var(--text3);margin-left:8px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:800}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* TOAST */
#toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;min-width:260px;animation:slideIn .2s ease}
.toast.success{border-left:4px solid var(--success);color:var(--success)}
.toast.error{border-left:4px solid var(--danger);color:var(--danger)}
.toast.info{border-left:4px solid var(--primary);color:var(--primary)}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* TXT PREVIEW */
.txt-preview{background:#0f2137;color:#a8d8ea;font-family:'Courier New',monospace;font-size:11px;padding:16px;border-radius:8px;overflow-x:auto;white-space:pre;max-height:300px;overflow-y:auto}

/* CONSOLIDATION */
.consol-table{width:100%;border-collapse:collapse;font-size:13px}
.consol-table th{background:#f8fafc;color:var(--text3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:2px solid var(--border)}
.consol-table td{padding:10px 14px;border-bottom:1px solid #f1f5f9}
.consol-table tr:hover td{background:#fafcff}
.tipo-P{color:var(--success);font-weight:800}
.tipo-N{color:var(--danger);font-weight:800}

/* RESPONSIVE */
@media(max-width:900px){#sidebar{transform:translateX(-240px)}.sidebar-open #sidebar{transform:translateX(0)}#main{margin-left:0}.charts-row{grid-template-columns:1fr}}
@media print{#sidebar,#topbar,.btn,#toast-container{display:none!important}#main{margin:0}#content{padding:0}}
</style>
</head>
<body>

<script>
// ============================================================
// CONFIGURAÇÃO SUPABASE
// ============================================================
const SUPABASE_URL = 'https://seu-projeto.supabase.co'; // <--- Altere para a sua URL do Supabase
const SUPABASE_KEY = 'sua-chave-anon-public';         // <--- Altere para a sua chave pública anónima do Supabase
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE & CONFIG
// ============================================================
let state = {
  lancamentos: [],
  imoveis: [
    {id:'IM001', codigo:'IM001', descricao:'Fazenda Santa Clara', municipio:'Londrina', uf:'PR'},
    {id:'IM002', codigo:'IM002', descricao:'Sítio Boa Vista', municipio:'Maringá', uf:'PR'},
    {id:'IM003', codigo:'IM003', descricao:'Chácara São João', municipio:'Cascavel', uf:'PR'},
  ],
  contas: [
    {id:'CC001', codigo:'CC001', descricao:'Banco do Brasil - Conta Corrente'},
    {id:'CC002', codigo:'CC002', descricao:'Caixa Econômica - Poupança Rural'},
    {id:'CC003', codigo:'CC003', descricao:'Sicredi - Conta Corrente'},
    {id:'CC004', codigo:'CC004', descricao:'Caixa - Conta Corrente'},
  ],
  cpfProdutor: '',
  nomeProdutor: '',
  anoCalendario: new Date().getFullYear(),
  editingId: null,
  currentPage: 1,
  itemsPerPage: 20,
  filterTipo: '',
  filterImovel: '',
  filterSearch: '',
  sortCol: 'data',
  sortDir: 'asc'
};

function saveState() {
  const settingsToSave = {
    cpfProdutor: state.cpfProdutor,
    nomeProdutor: state.nomeProdutor,
    anoCalendario: state.anoCalendario
  };
  localStorage.setItem('lcdpr_settings', JSON.stringify(settingsToSave));
}

async function loadState() {
  try {
    const rawSettings = localStorage.getItem('lcdpr_settings');
    if (rawSettings) {
      const parsedSettings = JSON.parse(rawSettings);
      state = {...state, ...parsedSettings};
    }
  } catch(e) {}

  document.getElementById('ano-badge').textContent = `Ano: ${state.anoCalendario}`;

  try {
    const { data, error } = await supabase
      .from('lancamentos')
      .select('*')
      .order('data', { ascending: true });

    if (error) throw error;

    if (data && data.length > 0) {
      state.lancamentos = data;
    } else {
      await seedDataSupabase();
    }
  } catch (error) {
    console.error('Erro ao conectar com o Supabase:', error);
    toast('Erro de ligação ao Supabase!', 'error');
  }
  
  renderPage(currentPage);
}

async function seedDataSupabase() {
  const seeds = [
    {data:'2025-01-10',codigoImovel:'IM001',codigoConta:'CC001',numeroDocumento:'NF-0001',tipoDocumento:1,historico:'Venda de soja safra 2024/2025 - Lote 01',cpfCnpj:'12.345.678/0001-99',tipoLancamento:1,valor:1200000,situacao:'N'},
    {data:'2025-01-22',codigoImovel:'IM001',codigoConta:'CC001',numeroDocumento:'REC-0010',tipoDocumento:3,historico:'Compra de sementes de milho - fornecedor Agrosul',cpfCnpj:'987.654.321-00',tipoLancamento:2,valor:380000,situacao:'N'},
    {data:'2025-02-05',codigoImovel:'IM002',codigoConta:'CC002',numeroDocumento:'NF-0015',tipoDocumento:1,historico:'Venda de milho - Cooperativa Regional',cpfCnpj:'11.222.333/0001-44',tipoLancamento:1,valor:850000,situacao:'N'},
    {data:'2025-02-18',codigoImovel:'IM001',codigoConta:'CC001',numeroDocumento:'FAT-0023',tipoDocumento:2,historico:'Pagamento de defensivos agrícolas',cpfCnpj:'55.666.777/0001-88',tipoLancamento:2,valor:290000,situacao:'N'},
    {data:'2025-03-08',codigoImovel:'IM003',codigoConta:'CC003',numeroDocumento:'NF-0031',tipoDocumento:1,historico:'Venda de trigo - Exportação',cpfCnpj:'22.333.444/0001-55',tipoLancamento:1,valor:2100000,situacao:'N'},
    {data:'2025-03-15',codigoImovel:'IM002',codigoConta:'CC002',numeroDocumento:'FP-0001',tipoDocumento:5,historico:'Folha de pagamento - colaboradores março',cpfCnpj:'111.222.333-44',tipoLancamento:2,valor:450000,situacao:'N'},
    {data:'2025-04-03',codigoImovel:'IM001',codigoConta:'CC001',numeroDocumento:'NF-0042',tipoDocumento:1,historico:'Venda de algodão - Lote 02',cpfCnpj:'33.444.555/0001-66',tipoLancamento:1,valor:750000,situacao:'N'},
    {data:'2025-04-20',codigoImovel:'IM001',codigoConta:'CC001',numeroDocumento:'CTR-0005',tipoDocumento:4,historico:'Manutenção de máquinas agrícolas',cpfCnpj:'444.555.666-77',tipoLancamento:2,valor:180000,situacao:'N'},
    {data:'2025-05-12',codigoImovel:'IM003',codigoConta:'CC003',numeroDocumento:'NF-0058',tipoDocumento:1,historico:'Venda de cana-de-açúcar - Usina Norte',cpfCnpj:'77.888.999/0001-00',tipoLancamento:1,valor:680000,situacao:'P'},
    {data:'2025-05-28',codigoImovel:'IM002',codigoConta:'CC002',numeroDocumento:'REC-0041',tipoDocumento:3,historico:'Compra de fertilizantes NPK',cpfCnpj:'888.999.000-11',tipoLancamento:2,valor:320000,situacao:'N'},
  ];
  
  const mappedSeeds = seeds.map(s => ({
    ...s, 
    createdAt: new Date().toISOString(), 
    updatedAt: new Date().toISOString()
  }));

  const { data, error } = await supabase
    .from('lancamentos')
    .insert(mappedSeeds)
    .select();

  if (!error && data) {
    state.lancamentos = data;
  }
}

// ============================================================
// FORMATTERS
// ============================================================
function formatBRL(centavos) {
  return (centavos / 100).toLocaleString('pt-BR', {style:'currency',currency:'BRL'});
}

function formatDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function formatMesAnoLCDPR(iso) {
  const [y,m] = iso.split('-');
  return `${m}${y}`;
}

function tipoLanctoLabel(t) {
  return {1:'Receita',2:'Despesa',3:'Adiantamento'}[t] || '';
}

function mesLabel(mm) {
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return meses[parseInt(mm)-1] || mm;
}

function parseBRL(v) {
  return Math.round(parseFloat(v.replace(/\./g,'').replace(',','.') || '0') * 100);
}

function formatInputBRL(centavos) {
  return (centavos/100).toFixed(2).replace('.',',');
}

// ============================================================
// CALCULATORS
// ============================================================
function calcularSaldos(lancamentos) {
  const sorted = [...lancamentos].sort((a,b) => new Date(a.data).getTime() - new Date(b.data).getTime());
  let saldo = 0;
  return sorted.map(l => {
    if (l.tipoLancamento === 1) saldo += l.valor;
    else if (l.tipoLancamento === 2) saldo -= l.valor;
    return {...l, saldoFinal: saldo};
  });
}

function consolidarPorMes(lancamentos) {
  const map = {};
  for (const l of lancamentos) {
    const chave = formatMesAnoLCDPR(l.data);
    if (!map[chave]) map[chave] = {receitas:0,despesas:0,qtd:0};
    if (l.tipoLancamento === 1) map[chave].receitas += l.valor;
    else if (l.tipoLancamento === 2) map[chave].despesas += l.valor;
    map[chave].qtd++;
  }
  return Object.entries(map)
    .sort(([a],[b]) => {
      const toN = k => parseInt(k.slice(2))*100 + parseInt(k.slice(0,2));
      return toN(a) - toN(b);
    })
    .map(([mesAno,{receitas,despesas,qtd}]) => {
      const resultado = receitas - despesas;
      return {mesAno, receitas, despesas, resultado: Math.abs(resultado), tipo: resultado >= 0 ? 'P' : 'N', qtdLancamentos: qtd};
    });
}

function getStats() {
  const lancamentos = calcularSaldos(state.lancamentos);
  let totalReceitas = 0, totalDespesas = 0;
  for (const l of lancamentos) {
    if (l.tipoLancamento === 1) totalReceitas += l.valor;
    else if (l.tipoLancamento === 2) totalDespesas += l.valor;
  }
  const saldoAtual = lancamentos.length ? lancamentos[lancamentos.length-1].saldoFinal : 0;
  const consolidado = consolidarPorMes(lancamentos);
  return {totalReceitas, totalDespesas, saldoAtual, totalLancamentos: lancamentos.length, lancamentos, consolidado};
}

// ============================================================
// NAVIGATION & PAGE ROTATION
// ============================================================
let activePage = 'dashboard';

function navigate(page) {
  activePage = page;
  document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
  
  const menuMap = {dashboard:0, novo:1, lancamentos:2, exportacao:3, consolidacao:4, demonstrativo:5, config:6};
  const items = document.querySelectorAll('.menu-item');
  if (items[menuMap[page]]) items[menuMap[page]].classList.add('active');

  const titles = {
    dashboard:'Dashboard', novo:'Novo Lançamento', lancamentos:'Todos os Lançamentos',
    exportacao:'Exportar LCDPR TXT', consolidacao:'Consolidação Mensal (Q200)',
    demonstrativo:'Demonstrativo de Lançamentos', config:'Configurações'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  if(page !== 'novo') state.editingId = null;
  renderPage(page);
}

function renderPage(page) {
  const el = document.getElementById('content');
  switch(page) {
    case 'dashboard': el.innerHTML = renderDashboard(); initCharts(); break;
    case 'novo': el.innerHTML = renderForm(); break;
    case 'lancamentos': el.innerHTML = renderLancamentos(); break;
    case 'exportacao': el.innerHTML = renderExportacao(); break;
    case 'consolidacao': el.innerHTML = renderConsolidacao(); break;
    case 'demonstrativo': el.innerHTML = renderDemonstrativo(); break;
    case 'config': el.innerHTML = renderConfig(); break;
  }
}

// ============================================================
// VIEWS PARTS
// ============================================================
function renderDashboard() {
  const {totalReceitas, totalDespesas, saldoAtual, totalLancamentos, lancamentos} = getStats();
  const ultimos = [...lancamentos].reverse().slice(0,5);

  return `
  <div class="cards-grid">
    <div class="stat-card green"><div class="label">Total Receitas</div><div class="value">${formatBRL(totalReceitas)}</div></div>
    <div class="stat-card red"><div class="label">Total Despesas</div><div class="value">${formatBRL(totalDespesas)}</div></div>
    <div class="stat-card ${saldoAtual >= 0 ? 'green':'red'}"><div class="label">Saldo Atual</div><div class="value">${formatBRL(saldoAtual)}</div></div>
    <div class="stat-card blue"><div class="label">Lançamentos</div><div class="value">${totalLancamentos}</div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><h3>Evolução Mensal</h3><div class="chart-wrap"><canvas id="chartBar"></canvas></div></div>
    <div class="chart-card"><h3>Distribuição</h3><div class="chart-wrap"><canvas id="chartPie"></canvas></div></div>
  </div>`;
}

function initCharts() {
  const {consolidado, totalReceitas, totalDespesas} = getStats();
  const labels = consolidado.map(c => mesLabel(c.mesAno.slice(0,2))+'/'+c.mesAno.slice(2));
  
  const barCtx = document.getElementById('chartBar');
  if (barCtx) {
    new Chart(barCtx, {
      type:'bar',
      data:{
        labels: labels,
        datasets:[
          {label:'Receitas', data: consolidado.map(c=>c.receitas/100), backgroundColor:'rgba(22,163,74,0.7)'},
          {label:'Despesas', data: consolidado.map(c=>c.despesas/100), backgroundColor:'rgba(220,38,38,0.7)'}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false}
    });
  }

  const pieCtx = document.getElementById('chartPie');
  if (pieCtx) {
    new Chart(pieCtx, {
      type:'pie',
      data:{
        labels:['Receitas','Despesas'],
        datasets:[{data:[totalReceitas/100, totalDespesas/100], backgroundColor:['#16a34a','#dc2626']}]
      },
      options:{responsive:true,maintainAspectRatio:false}
    });
  }
}

function renderForm() {
  const l = state.lancamentos.find(item => item.id === state.editingId) || {};
  return `
  <form id="lancamento-form" onsubmit="salvarLancamento(event)">
    <div class="form-section">
      <div class="form-section-title">${state.editingId ? '✏️ Editar Lançamento' : '➕ Novo Lançamento'}</div>
      <div class="form-grid">
        <div class="form-group"><label>Data *</label><input type="date" class="form-control" id="f-data" value="${l.data||new Date().toISOString().slice(0,10)}" required></div>
        <div class="form-group">
          <label>Imóvel Rural *</label>
          <select class="form-control" id="f-imovel" required>
            ${state.imoveis.map(i=>`<option value="${i.codigo}" ${l.codigoImovel===i.codigo?'selected':''}>${i.descricao}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Conta Bancária *</label>
          <select class="form-control" id="f-conta" required>
            ${state.contas.map(c=>`<option value="${c.codigo}" ${l.codigoConta===c.codigo?'selected':''}>${c.descricao}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Histórico *</label><input type="text" class="form-control" id="f-historico" value="${l.historico||''}" required></div>
        <div class="form-group"><label>CPF/CNPJ</label><input type="text" class="form-control" id="f-cpfCnpj" value="${l.cpfCnpj||''}"></div>
        <div class="form-group">
          <label>Tipo *</label>
          <select class="form-control" id="f-tipo" required>
            <option value="1" ${l.tipoLancamento===1?'selected':''}>Receita</option>
            <option value="2" ${l.tipoLancamento===2?'selected':''}>Despesa</option>
          </select>
        </div>
        <div class="form-group"><label>Valor (R$) *</label><input type="text" class="form-control" id="f-valor" value="${l.valor ? formatInputBRL(l.valor) : '0,00'}" required></div>
      </div>
      <div style="margin-top:20px; display:flex; gap:10px;">
        <button type="submit" class="btn btn-success">Salvar no Supabase</button>
        <button type="button" class="btn btn-outline" onclick="navigate('lancamentos')">Cancelar</button>
      </div>
    </div>
  </form>`;
}

async function salvarLancamento(e) {
  e.preventDefault();
  const payload = {
    data: document.getElementById('f-data').value,
    codigoImovel: document.getElementById('f-imovel').value,
    codigoConta: document.getElementById('f-conta').value,
    historico: document.getElementById('f-historico').value,
    cpfCnpj: document.getElementById('f-cpfCnpj').value,
    tipoLancamento: parseInt(document.getElementById('f-tipo').value),
    valor: parseBRL(document.getElementById('f-valor').value),
    numeroDocumento: 'NF-SUPA',
    tipoDocumento: 1,
    situacao: 'N',
    updatedAt: new Date().toISOString()
  };

  try {
    if (state.editingId) {
      const { error } = await supabase.from('lancamentos').update(payload).eq('id', state.editingId);
      if (error) throw error;
      toast('Lançamento atualizado no Supabase!', 'success');
    } else {
      payload.createdAt = new Date().toISOString();
      const { error } = await supabase.from('lancamentos').insert([payload]);
      if (error) throw error;
      toast('Lançamento guardado no Supabase!', 'success');
    }
  } catch (error) {
    console.error(error);
    toast('Erro ao guardar dados.', 'error');
  }
  state.editingId = null;
  await loadState();
}

function renderLancamentos() {
  return `
  <div class="table-card">
    <div class="table-header"><h3>Todos os Lançamentos Activos (Supabase)</h3></div>
    <table style="width:100%">
      <thead><tr><th>Data</th><th>Histórico</th><th>Tipo</th><th>Valor</th><th>Ações</th></tr></thead>
      <tbody>
        ${state.lancamentos.map(l => `
          <tr>
            <td>${formatDate(l.data)}</td>
            <td>${l.historico}</td>
            <td><span class="badge ${l.tipoLancamento===1?'badge-receita':'badge-despesa'}">${tipoLanctoLabel(l.tipoLancamento)}</span></td>
            <td class="${l.tipoLancamento===1?'receita-val':'despesa-val'}">${formatBRL(l.valor)}</td>
            <td>
              <button class="btn btn-outline btn-sm" onclick="editarReg('${l.id}')">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="deletarReg('${l.id}')">Excluir</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>`;
}

function editarReg(id) {
  state.editingId = id;
  navigate('novo');
}

async function deletarReg(id) {
  if (!confirm('Deseja mesmo excluir este registro do Supabase?')) return;
  try {
    const { error } = await supabase.from('lancamentos').delete().eq('id', id);
    if (error) throw error;
    toast('Removido com sucesso!', 'success');
    await loadState();
  } catch (error) {
    console.error(error);
    toast('Erro ao deletar.', 'error');
  }
}

function renderExportacao() {
  return `<div class="empty-state"><h3>Módulo de Exportação</h3><p>Pronto para gerar arquivos baseados nos dados do Supabase.</p></div>`;
}

  const {consolidado} = getStats();

    <table class="consol-table">
      <thead><tr><th>Mês/Ano</th><th>Receitas</th><th>Despesas</th><th>Resultado</th><th>Tipo</th></tr></thead>
      <tbody>
        ${consolidado.map(c => `
          <tr>
            <td>${c.mesAno.slice(0,2)}/${c.mesAno.slice(2)}</td>
            <td class="receita-val">${formatBRL(c.receitas)}</td>
            <td class="despesa-val">${formatBRL(c.despesas)}</td>
            <td>${formatBRL(c.resultado)}</td>
            <td class="tipo-${c.tipo}">${c.tipo === 'P' ? 'LUCRO' : 'PREJUÍZO'}</td>
          </tr>
        `).join('')}
      </tbody>

}

function renderDemonstrativo() {
  const {lancamentos} = getStats();
  return `
  <div class="table-card">
    <table style="width:100%">
      <thead><tr><th>Data</th><th>Conta</th><th>Histórico</th><th>Entradas</th><th>Saídas</th><th>Saldo</th></tr></thead>
      <tbody>
        ${lancamentos.map(l => `
          <tr>
            <td>${formatDate(l.data)}</td>

        `).join('')}

}

function renderConfig() {
  return `
  <div class="form-section">
    <div class="form-section-title">Configurações do Produtor</div>
    <div class="form-group"><label>Nome do Produtor</label><input type="text" class="form-control" id="c-nome" value="${state.nomeProdutor||''}"></div><br>
    <button class="btn btn-primary" onclick="salvarConfig()">Salvar Configurações</button>
  </div>`;
}

function salvarConfig() {
  state.nomeProdutor = document.getElementById('c-nome').value;
  saveState();
  toast('Configurações salvas localmente!', 'success');
}

// ============================================================
// TOAST ANIMADO ORIGINAL CORRIGIDO
// ============================================================
function toast(msg, tipo='info') {
  const el = document.createElement('div');
  el.className = `toast ${tipo}`;
  const icons = {success:'✅', error:'❌', info:'ℹ️', warning:'⚠️'};
  el.innerHTML = `<span>${icons[tipo]||'ℹ️'}</span> ${msg}`;
  const container = document.getElementById('toast-container');
  if(container) {
    container.appendChild(el);
    setTimeout(()=>{
      el.style.opacity='0';
      el.style.transform='translateX(40px)';
      el.style.transition='all .3s';
      setTimeout(()=>el.remove(), 300);
    }, 3000);
  }
}

function fecharModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

window.addEventListener('DOMContentLoaded', loadState);
