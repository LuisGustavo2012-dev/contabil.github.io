<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCDPR Digital — Livro Caixa Digital do Produtor Rural</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0f4f8;
  --sidebar: #0f2137;
  --sidebar-hover: #1a3550;
  --sidebar-active: #1e90ff;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1a202c;
  --text2: #4a5568;
  --text3: #718096;
  --primary: #1e90ff;
  --primary-dark: #1565c0;
  --success: #16a34a;
  --danger: #dc2626;
  --warning: #d97706;
  --info: #0891b2;
  --input-bg: #f8fafc;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:14px}
a{color:var(--primary);text-decoration:none}

/* SIDEBAR */
#sidebar{width:240px;min-width:240px;background:var(--sidebar);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo h1{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.3px}
.sidebar-logo span{color:rgba(255,255,255,0.45);font-size:11px;display:block;margin-top:2px}
.sidebar-menu{flex:1;overflow-y:auto;padding:12px 0}
.menu-section{color:rgba(255,255,255,0.3);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:12px 20px 6px}
.menu-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:rgba(255,255,255,0.65);cursor:pointer;transition:all .15s;border-left:3px solid transparent;font-size:13px}
.menu-item:hover{background:var(--sidebar-hover);color:#fff}
.menu-item.active{background:rgba(30,144,255,0.15);color:var(--sidebar-active);border-left-color:var(--sidebar-active)}
.menu-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08)}
.sidebar-footer small{color:rgba(255,255,255,0.3);font-size:10px}

/* MAIN */
#main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:17px;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.badge-year{background:#e8f4ff;color:var(--primary);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
#content{padding:28px;flex:1}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-card .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px}
.stat-card .value{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.stat-card .sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-card.green .value{color:var(--success)}
.stat-card.red .value{color:var(--danger)}
.stat-card.blue .value{color:var(--primary)}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:28px}
.chart-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.chart-card h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
.chart-wrap{position:relative;height:220px}

/* TABLE */
.table-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.table-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.table-header h3{font-size:14px;font-weight:700}
.table-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding: 12px 20px; background: #fafcff; border-bottom: 1px solid var(--border)}
.search-box{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 10px}
.search-box input{border:none;background:none;font-size:13px;color:var(--text);width:160px;outline:none}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;color:var(--text3);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--primary)}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;color:var(--text);vertical-align:middle}
tr:hover td{background:#fafcff}
tr:last-child td{border-bottom:none}
.tfoot-row td{background:#f8fafc;font-weight:700;color:var(--text);border-top:2px solid var(--border)}
.receita-val{color:var(--success);font-weight:700}
.despesa-val{color:var(--danger);font-weight:700}
.saldo-pos{color:var(--success);font-weight:700}
.saldo-neg{color:var(--danger);font-weight:700}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-warning{background:var(--warning);color:#fff}
.btn-warning:hover{background:#b45309}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:#f8fafc;border-color:var(--primary);color:var(--primary)}
.btn-ghost{background:none;color:var(--text2);border:none;padding:6px 8px}
.btn-ghost:hover{background:#f1f5f9;color:var(--danger)}
.btn-sm{padding:5px 10px;font-size:12px}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-control{border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;color:var(--text);background:var(--input-bg);transition:border .15s;width:100%;font-family:inherit}
.form-control:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(30,144,255,0.1)}
textarea.form-control{resize:vertical;min-height:72px}
select.form-control{cursor:pointer}
.form-section{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:20px}
.form-section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700}
.badge-normal{background:#e8f5e9;color:#2e7d32}
.badge-p{background:#fff3e0;color:#e65100}
.badge-receita{background:#dcfce7;color:#15803d}
.badge-despesa{background:#fee2e2;color:#b91c1c}
.badge-adiantamento{background:#ede9fe;color:#7c3aed}

/* PAGINATION */
.pagination{display:flex;align-items:center;gap:4px;padding:12px 20px;border-top:1px solid var(--border)}
.page-btn{border:1px solid var(--border);background:#fff;color:var(--text);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.page-btn:hover,.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-info{font-size:12px;color:var(--text3);margin-left:8px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:800}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* TOAST */
#toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;min-width:260px;animation:slideIn .2s ease}
.toast.success{border-left:4px solid var(--success);color:var(--success)}
.toast.error{border-left:4px solid var(--danger);color:var(--danger)}
.toast.info{border-left:4px solid var(--primary);color:var(--primary)}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* VALIDATION */
.validation-error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;margin-bottom:8px}
.validation-error strong{color:var(--danger);font-size:12px}
.validation-error p{color:#7f1d1d;font-size:12px;margin-top:2px}

/* TXT PREVIEW */
.txt-preview{background:#0f2137;color:#a8d8ea;font-family:'Courier New',monospace;font-size:11px;padding:16px;border-radius:8px;overflow-x:auto;white-space:pre;max-height:300px;overflow-y:auto}

/* REPORT TABLE */
.report-table th{font-size:11px}
.report-table td{font-size:12px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state svg{width:48px;height:48px;margin:0 auto 12px;opacity:.3}
.empty-state h3{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text2)}
.empty-state p{font-size:13px}

/* CONSOLIDATION */
.consol-table{width:100%;border-collapse:collapse;font-size:13px}
.consol-table th{background:#f8fafc;color:var(--text3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:2px solid var(--border)}
.consol-table td{padding:10px 14px;border-bottom:1px solid #f1f5f9}
.consol-table tr:hover td{background:#fafcff}
.tipo-P{color:var(--success);font-weight:800}
.tipo-N{color:var(--danger);font-weight:800}

/* RESPONSIVE */
@media(max-width:900px){#sidebar{transform:translateX(-240px)}.sidebar-open #sidebar{transform:translateX(0)}#main{margin-left:0}.charts-row{grid-template-columns:1fr}}
@media print{#sidebar,#topbar,.btn,#toast-container{display:none!important}#main{margin:0}#content{padding:0}}

/* CHECKBOX */
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--primary)}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px}
.tab-btn{padding:10px 20px;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-btn:hover{color:var(--primary)}

/* SUMMARY ROW */
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.sum-item{background:var(--card);border-radius:8px;padding:14px;border:1px solid var(--border);text-align:center}
.sum-item .sl{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.sum-item .sv{font-size:18px;font-weight:800}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="sidebar-logo">
    <h1>🌿 LCDPR Digital</h1>
    <span>Receita Federal — v3.1</span>
  </div>

<div id="main">
  <div class="topbar" id="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div class="topbar-right">
      <span class="badge-year" id="ano-badge">Ano: 2025</span>

    <div class="modal-header">
      <h3 id="modal-title">Confirmação</h3>
      <button class="btn btn-ghost" onclick="fecharModal()">✕</button>

    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ============================================================
// STATE & PERSISTENCE
// ============================================================
const STORAGE_KEY = 'lcdpr_data_v2';

let state = {
  lancamentos: [],
  imoveis: [
    {id:'IM001', codigo:'IM001', descricao:'Fazenda Santa Clara', municipio:'Londrina', uf:'PR'},
    {id:'IM002', codigo:'IM002', descricao:'Sítio Boa Vista', municipio:'Maringá', uf:'PR'},
    {id:'IM003', codigo:'IM003', descricao:'Chácara São João', municipio:'Cascavel', uf:'PR'},
  ],
  contas: [
    {id:'CC001', codigo:'CC001', descricao:'Banco do Brasil - Conta Corrente'},
    {id:'CC002', codigo:'CC002', descricao:'Caixa Econômica - Poupança Rural'},
    {id:'CC003', codigo:'CC003', descricao:'Sicredi - Conta Corrente'},
    {id:'CC004', codigo:'CC004', descricao:'Caixa - Conta Corrente'},
  ],
  cpfProdutor: '',
  nomeProdutor: '',
  anoCalendario: new Date().getFullYear(),
  editingId: null,
  currentPage: 1,
  itemsPerPage: 20,
  filterTipo: '',
  filterImovel: '',
  filterSearch: '',
  sortCol: 'data',
  sortDir: 'asc',
  selectedIds: new Set(),
};

function saveState() {
  const toSave = {...state, selectedIds: []};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = {...state, ...parsed, selectedIds: new Set()};
    }
  } catch(e) {}
  if (state.lancamentos.length === 0) seedData();
}

function seedData() {
  const seeds = [
    {data:'2025-01-10',codigoImovel:'IM001',codigoConta:'CC001',numeroDocumento:'NF-0001',tipoDocumento:1,historico:'Venda de soja safra 2024/2025 - Lote 01',cpfCnpj:'12.345.678/0001-99',tipoLancamento:1,valor:1200000,situacao:'N'},
    {data:'2025-01-22',codigoImovel:'IM001',codigoConta:'CC001',numeroDocumento:'REC-0010',tipoDocumento:3,historico:'Compra de sementes de milho - fornecedor Agrosul',cpfCnpj:'987.654.321-00',tipoLancamento:2,valor:380000,situacao:'N'},
    {data:'2025-02-05',codigoImovel:'IM002',codigoConta:'CC002',numeroDocumento:'NF-0015',tipoDocumento:1,historico:'Venda de milho - Cooperativa Regional',cpfCnpj:'11.222.333/0001-44',tipoLancamento:1,valor:850000,situacao:'N'},
    {data:'2025-02-18',codigoImovel:'IM001',codigoConta:'CC001',numeroDocumento:'FAT-0023',tipoDocumento:2,historico:'Pagamento de defensivos agrícolas',cpfCnpj:'55.666.777/0001-88',tipoLancamento:2,valor:290000,situacao:'N'},
    {data:'2025-03-08',codigoImovel:'IM003',codigoConta:'CC003',numeroDocumento:'NF-0031',tipoDocumento:1,historico:'Venda de trigo - Exportação',cpfCnpj:'22.333.444/0001-55',tipoLancamento:1,valor:2100000,situacao:'N'},
    {data:'2025-03-15',codigoImovel:'IM002',codigoConta:'CC002',numeroDocumento:'FP-0001',tipoDocumento:5,historico:'Folha de pagamento - colaboradores março',cpfCnpj:'111.222.333-44',tipoLancamento:2,valor:450000,situacao:'N'},
    {data:'2025-04-03',codigoImovel:'IM001',codigoConta:'CC001',numeroDocumento:'NF-0042',tipoDocumento:1,historico:'Venda de algodão - Lote 02',cpfCnpj:'33.444.555/0001-66',tipoLancamento:1,valor:750000,situacao:'N'},
    {data:'2025-04-20',codigoImovel:'IM001',codigoConta:'CC001',numeroDocumento:'CTR-0005',tipoDocumento:4,historico:'Manutenção de máquinas agrícolas',cpfCnpj:'444.555.666-77',tipoLancamento:2,valor:180000,situacao:'N'},
    {data:'2025-05-12',codigoImovel:'IM003',codigoConta:'CC003',numeroDocumento:'NF-0058',tipoDocumento:1,historico:'Venda de cana-de-açúcar - Usina Norte',cpfCnpj:'77.888.999/0001-00',tipoLancamento:1,valor:680000,situacao:'P'},
    {data:'2025-05-28',codigoImovel:'IM002',codigoConta:'CC002',numeroDocumento:'REC-0041',tipoDocumento:3,historico:'Compra de fertilizantes NPK',cpfCnpj:'888.999.000-11',tipoLancamento:2,valor:320000,situacao:'N'},
  ];
  state.lancamentos = seeds.map(s => ({...s, id: genId(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()}));
  saveState();
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ============================================================
// FORMATTERS
// ============================================================
function formatBRL(centavos) {
  return (centavos / 100).toLocaleString('pt-BR', {style:'currency',currency:'BRL'});
}

function formatDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function formatLCDPR(centavos) {
  return String(Math.abs(Math.round(centavos))).padStart(18, '0');
}

function formatDataLCDPR(iso) {
  const [y,m,d] = iso.split('-');
  return `${d}${m}${y}`;
}

function formatMesAnoLCDPR(iso) {
  const [y,m] = iso.split('-');
  return `${m}${y}`;
}

function maskCpfCnpj(v) {
  const d = v.replace(/\D/g,'');
  if (d.length <= 11) return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
  return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
}

function parseBRL(v) {
  return Math.round(parseFloat(v.replace(/\./g,'').replace(',','.') || '0') * 100);
}

function formatInputBRL(centavos) {
  return (centavos/100).toFixed(2).replace('.',',');
}

function tipoLanctoLabel(t) {
  return {1:'Receita',2:'Despesa',3:'Adiantamento'}[t] || '';
}

function tipoDocLabel(t) {
  return {1:'Nota Fiscal',2:'Fatura',3:'Recibo',4:'Contrato',5:'Folha Pgto',6:'Outros'}[t] || '';
}

function mesLabel(mm) {
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return meses[parseInt(mm)-1] || mm;
}

// ============================================================
// CALCULATORS
// ============================================================
function calcularSaldos(lancamentos) {
  const sorted = [...lancamentos].sort((a,b) => {
    const da = new Date(a.data).getTime(), db = new Date(b.data).getTime();
    return da !== db ? da - db : a.createdAt.localeCompare(b.createdAt);
  });
  let saldo = 0;
  return sorted.map(l => {
    if (l.tipoLancamento === 1) saldo += l.valor;
    else if (l.tipoLancamento === 2) saldo -= l.valor;
    return {...l, saldoFinal: saldo};
  });
}

function consolidarPorMes(lancamentos) {
  const map = {};
  for (const l of lancamentos) {
    const chave = formatMesAnoLCDPR(l.data);
    if (!map[chave]) map[chave] = {receitas:0,despesas:0,qtd:0};
    if (l.tipoLancamento === 1) map[chave].receitas += l.valor;
    else if (l.tipoLancamento === 2) map[chave].despesas += l.valor;
    map[chave].qtd++;
  }
  return Object.entries(map)
    .sort(([a],[b]) => {
      const toN = k => parseInt(k.slice(2))*100 + parseInt(k.slice(0,2));
      return toN(a) - toN(b);
    })
    .map(([mesAno,{receitas,despesas,qtd}]) => {
      const resultado = receitas - despesas;
      return {mesAno, receitas, despesas, resultado: Math.abs(resultado), tipo: resultado >= 0 ? 'P' : 'N', qtdLancamentos: qtd};
    });
}

function getStats() {
  const lancamentos = calcularSaldos(state.lancamentos);
  let totalReceitas = 0, totalDespesas = 0;
  for (const l of lancamentos) {
    if (l.tipoLancamento === 1) totalReceitas += l.valor;
    else if (l.tipoLancamento === 2) totalDespesas += l.valor;
  }
  const saldoAtual = lancamentos.length ? lancamentos[lancamentos.length-1].saldoFinal : 0;
  const consolidado = consolidarPorMes(lancamentos);
  const mesesPos = consolidado.filter(m => m.tipo === 'P').length;
  const mesesNeg = consolidado.filter(m => m.tipo === 'N').length;
  return {totalReceitas, totalDespesas, saldoAtual, mesesPos, mesesNeg, totalLancamentos: lancamentos.length, lancamentos, consolidado};
}

// ============================================================
// NAVIGATION
// ============================================================
let currentPageName = 'dashboard';

function navigate(page) {
  currentPageName = page;
  document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
  const map = {dashboard:0,novo:1,lancamentos:2,exportacao:3,consolidacao:4,demonstrativo:5,config:6};
  const items = document.querySelectorAll('.menu-item');
  if (items[map[page]]) items[map[page]].classList.add('active');

  const titles = {
    dashboard:'Dashboard',novo:'Novo Lançamento',lancamentos:'Todos os Lançamentos',
    exportacao:'Exportar LCDPR TXT',consolidacao:'Consolidação Mensal (Q200)',
    demonstrativo:'Demonstrativo de Lançamentos',config:'Configurações'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  state.editingId = null;
  renderPage(page);
}

function renderPage(page) {
  const el = document.getElementById('content');
  switch(page) {
    case 'dashboard': el.innerHTML = renderDashboard(); initCharts(); break;
    case 'novo': el.innerHTML = renderForm(); break;
    case 'lancamentos': el.innerHTML = renderLancamentos(); break;
    case 'exportacao': el.innerHTML = renderExportacao(); break;
    case 'consolidacao': el.innerHTML = renderConsolidacao(); break;
    case 'demonstrativo': el.innerHTML = renderDemonstrativo(); break;
    case 'config': el.innerHTML = renderConfig(); break;
  }
}

function initCharts() {
  const {consolidado} = getStats();
  const labels = consolidado.map(c => mesLabel(c.mesAno.slice(0,2))+'/'+c.mesAno.slice(2));
  const rec = consolidado.map(c => c.receitas/100);
  const desp = consolidado.map(c => c.despesas/100);
  
  const totalRec = state.lancamentos.filter(l=>l.tipoLancamento===1).reduce((a,b)=>a+b.valor,0);
  const totalDesp = state.lancamentos.filter(l=>l.tipoLancamento===2).reduce((a,b)=>a+b.valor,0);
  const totalAdiant = state.lancamentos.filter(l=>l.tipoLancamento===3).reduce((a,b)=>a+b.valor,0);

  const barCtx = document.getElementById('chartBar');
  if (barCtx) {
    new Chart(barCtx, {
      type:'bar',
      data:{
        labels: labels.length ? labels : ['Sem dados'],
        datasets:[
          {label:'Receitas',data:rec,backgroundColor:'rgba(22,163,74,0.7)',borderRadius:4},
          {label:'Despesas',data:desp,backgroundColor:'rgba(220,38,38,0.7)',borderRadius:4},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'R$'+v.toLocaleString('pt-BR')}}}}
    });
  }

  const pieCtx = document.getElementById('chartPie');
  if (pieCtx) {
    new Chart(pieCtx, {
      type:'pie',
      data:{
        labels:['Receitas','Despesas','Adiantamentos'],
        datasets:[{
          data:[totalRec/100, totalDesp/100, totalAdiant/100],
          backgroundColor:['#16a34a','#dc2626','#7c3aed']
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}
    });
  }
}

function salvarLancamento(e) {
  e.preventDefault();
  const rawValor = document.getElementById('f-valor').value;
  const valorCentavos = parseBRL(rawValor);
  
  if (valorCentavos <= 0) {
    toast('O valor deve ser maior do que zero.', 'error');
    return;
  }

  const lancto = {
    data: document.getElementById('f-data').value,
    codigoImovel: document.getElementById('f-imovel').value,
    codigoConta: document.getElementById('f-conta').value,
    tipoDocumento: parseInt(document.getElementById('f-tipodoc').value),
    numeroDocumento: document.getElementById('f-numdoc').value,
    cpfCnpj: document.getElementById('f-cpfcnpj').value.replace(/\D/g,''),
    tipoLancamento: parseInt(document.getElementById('f-tipolancto').value),
    valor: valorCentavos,
    situacao: document.getElementById('f-situacao').value,
    historico: document.getElementById('f-historico').value,
    updatedAt: new Date().toISOString()
  };

  if (state.editingId) {
    const idx = state.lancamentos.findIndex(item => item.id === state.editingId);
    if(idx !== -1) {
      lancto.id = state.editingId;
      lancto.createdAt = state.lancamentos[idx].createdAt;
      state.lancamentos[idx] = lancto;
    }
    state.editingId = null;
    toast('Lançamento atualizado com sucesso!', 'success');
  } else {
    lancto.id = genId();
    lancto.createdAt = new Date().toISOString();
    state.lancamentos.push(lancto);
    toast('Lançamento inserido com sucesso!', 'success');
  }

  saveState();
  navigate('lancamentos');
}

// TABELA PRINCIPAL DE LANCAMENTOS
// ============================================================
function renderLancamentos() {
  let list = calcularSaldos(state.lancamentos);

  if (state.filterTipo) list = list.filter(l => l.tipoLancamento === parseInt(state.filterTipo));
  if (state.filterImovel) list = list.filter(l => l.codigoImovel === state.filterImovel);
  if (state.filterSearch) {
    const s = state.filterSearch.toLowerCase();
    list = list.filter(l => l.historico.toLowerCase().includes(s) || l.numeroDocumento.toLowerCase().includes(s));
  }

  // Sorting
  list.sort((a,b) => {
    let va = a[state.sortCol], vb = b[state.sortCol];
    if (typeof va === 'string') return state.sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return state.sortDir === 'asc' ? va - vb : vb - va;
  });

  // Pagination
  const totalItems = list.length;
  const totalPages = Math.ceil(totalItems / state.itemsPerPage) || 1;
  if (state.currentPage > totalPages) state.currentPage = totalPages;
  const start = (state.currentPage - 1) * state.itemsPerPage;
  const paginated = list.slice(start, start + state.itemsPerPage);

  const totalReceitas = paginated.filter(l => l.tipoLancamento===1).reduce((a,b)=>a+b.valor,0);
  const totalDespesas = paginated.filter(l => l.tipoLancamento===2).reduce((a,b)=>a+b.valor,0);

  return `
    <div class="table-card">
      <div class="table-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;color:var(--text3)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Buscar histórico/doc..." value="${state.filterSearch}" oninput="state.filterSearch=this.value;state.currentPage=1;renderPage('lancamentos')">
        </div>
        <select class="form-control" style="width:130px;padding:5px 8px;" onchange="state.filterTipo=this.value;state.currentPage=1;renderPage('lancamentos')">
          <option value="">Todos os Tipos</option>
          <option value="1" ${state.filterTipo==='1'?'selected':''}>Receitas</option>
          <option value="2" ${state.filterTipo==='2'?'selected':''}>Despesas</option>
          <option value="3" ${state.filterTipo==='3'?'selected':''}>Adiantamentos</option>
        </select>
        <select class="form-control" style="width:160px;padding:5px 8px;" onchange="state.filterImovel=this.value;state.currentPage=1;renderPage('lancamentos')">
          <option value="">Todos os Imóveis</option>
          ${state.imoveis.map(i => `<option value="${i.codigo}" ${state.filterImovel===i.codigo?'selected':''}>${i.descricao}</option>`).join('')}
        </select>
        <div style="margin-left:auto;display:flex;gap:6px">
          ${state.selectedIds.size > 0 ? `<button class="btn btn-danger btn-sm" onclick="deletarLotes()">Remover (${state.selectedIds.size})</button>` : ''}
          <button class="btn btn-primary btn-sm" onclick="navigate('novo')">Novo Registro</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th style="width:40px"><input type="checkbox" ${paginated.length > 0 && paginated.every(l=>state.selectedIds.has(l.id))?'checked':''} onchange="toggleSelectAll(this, ${JSON.stringify(paginated.map(l=>l.id)).replace(/"/g,'&quot;')})"></th>
              <th onclick="toggleSort('data')">Data ${state.sortCol==='data'?(state.sortDir==='asc'?'▲':'▼'):''}</th>
              <th onclick="toggleSort('codigoImovel')">Imóvel ${state.sortCol==='codigoImovel'?(state.sortDir==='asc'?'▲':'▼'):''}</th>
              <th>Documento</th>
              <th onclick="toggleSort('historico')">Histórico ${state.sortCol==='historico'?(state.sortDir==='asc'?'▲':'▼'):''}</th>
              <th>Tipo</th>

              <th style="text-align:right">Saldo Caixa</th>
              <th style="text-align:center;width:90px">Ações</th>
            </tr>
          </thead>
          <tbody>
            ${paginated.length === 0 ? `<tr><td colspan="9"><div class="empty-state"><h3>Nenhum registro</h3><p>Use os botões acima para cadastrar dados.</p></div></td></tr>` : paginated.map(l => `
              <tr>
                <td><input type="checkbox" ${state.selectedIds.has(l.id)?'checked':''} onchange="toggleSelectId('${l.id}')"></td>
                <td>${formatDate(l.data)}</td>
                <td><span class="badge badge-normal" title="${l.codigoImovel}">${l.codigoImovel}</span></td>
                <td><small style="color:var(--text3)">${tipoDocLabel(l.tipoDocumento)}</small><br><strong>${l.numeroDocumento}</strong></td>
                <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.historico}">${l.historico}</td>

          </tfoot>
        </table>

        <button class="page-btn" ${state.currentPage===1?'disabled':''} onclick="state.currentPage--;renderPage('lancamentos')">◄ Voltar</button>
        <span class="page-info">Página <strong>${state.currentPage}</strong> de ${totalPages} (${totalItems} itens no total)</span>
        <button class="page-btn" ${state.currentPage===totalPages?'disabled':''} style="margin-left:auto" onclick="state.currentPage++;renderPage('lancamentos')">Avançar ►</button>
      </div>
    </div>`;
}

function toggleSort(col) {
  if (state.sortCol === col) {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    state.sortCol = col;
    state.sortDir = 'asc';
  }
  renderPage('lancamentos');
}

function toggleSelectId(id) {
  if (state.selectedIds.has(id)) state.selectedIds.delete(id);
  else state.selectedIds.add(id);
  renderPage('lancamentos');
}

function toggleSelectAll(chk, ids) {
  if (chk.checked) ids.forEach(id => state.selectedIds.add(id));
  else ids.forEach(id => state.selectedIds.delete(id));
  renderPage('lancamentos');
}

function editarLancamento(id) {
  state.editingId = id;
  navigate('novo');
}

function confirmarExclusao(id) {
  const corpo = `<p>Tem certeza de que deseja remover permanentemente o lançamento selecionado?</p><br><p><small style="color:var(--text3)">Esta ação recalculará automaticamente os saldos do caixa subsequentes.</small></p>`;
  const rodape = `
    <button class="btn btn-danger" onclick="removerLancamentoDirect('${id}')">Confirmar Exclusão</button>
    <button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
  `;
  abrirModal('Excluir Registro', corpo, rodape);
}

function removerLancamentoDirect(id) {
  state.lancamentos = state.lancamentos.filter(l => l.id !== id);
  state.selectedIds.delete(id);
  saveState();
  fecharModal();
  toast('Registro removido com sucesso!', 'warning');
  renderPage('lancamentos');
}

function deletarLotes() {
  if (confirm(`Deseja remover os ${state.selectedIds.size} registros selecionados?`)) {
    state.lancamentos = state.lancamentos.filter(l => !state.selectedIds.has(l.id));
    state.selectedIds.clear();
    saveState();
    toast('Registros excluídos em lote.', 'warning');
    renderPage('lancamentos');
  }
}

// ============================================================
// EXPORTAÇÃO COMPLETA DO LIVRO CAIXA DIGITAL (LCDPR)
// ============================================================
function renderExportacao() {
  return `
    <div class="form-section">
      <div class="form-section-title">Dados Obrigatórios da Declaração (Blocos 0 e Q)</div>
      <div class="form-grid">
        <div class="form-group">
          <label>CPF do Produtor Rural</label>
          <input type="text" id="cfg-cpf" class="form-control" value="${maskCpfCnpj(state.cpfProdutor)}" oninput="this.value=maskCpfCnpj(this.value)">
        </div>
        <div class="form-group">
          <label>Nome Completo do Produtor</label>
          <input type="text" id="cfg-nome" class="form-control" value="${state.nomeProdutor}" placeholder="Nome conforme cadastro Receita">
        </div>
        <div class="form-group">
          <label>Ano Calendário</label>
          <input type="number" id="cfg-ano" class="form-control" value="${state.anoCalendario}">
        </div>
      </div>
      <div style="margin-top:20px;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="salvarDadosProdutor()">Salvar Dados</button>
        <button class="btn btn-success" onclick="gerarLinhasLCDPR()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Gerar Arquivo Validável (.TXT)
        </button>
      </div>
    </div>
    <div id="export-preview-box" style="display:none">
      <div class="form-section">
        <div class="form-section-title">Pré-visualização do Arquivo (Estrutura Digital)</div>
        <div class="txt-preview" id="txt-preview-content"></div>
        <div style="margin-top:16px">
          <button class="btn btn-primary" onclick="fazerDownloadTXT()">Baixar Arquivo Oficial</button>
        </div>
      </div>
    </div>`;
}

function salvarDadosProdutor() {
  state.cpfProdutor = document.getElementById('cfg-cpf').value.replace(/\D/g,'');
  state.nomeProdutor = document.getElementById('cfg-nome').value.toUpperCase();
  state.anoCalendario = parseInt(document.getElementById('cfg-ano').value) || 2025;
  saveState();
  document.getElementById('ano-badge').textContent = `Ano: ${state.anoCalendario}`;
  toast('Dados cadastrais salvos para exportação.', 'success');
}

let textGeradoOficial = '';

function gerarLinhasLCDPR() {
  salvarDadosProdutor();
  if(!state.cpfProdutor || !state.nomeProdutor) {
    toast('Preencha o CPF e o Nome do Produtor Rural antes de exportar.', 'error');
    return;
  }

  const sorted = [...state.lancamentos].sort((a,b) => new Date(a.data).getTime() - new Date(b.data).getTime());
  let linhas = [];

  // 0000 - ABERTURA
  linhas.push(`0000|LCDPR|0013|${state.cpfProdutor}|${state.nomeProdutor}|0|0||01012025|31122025`);
  
  // 0040 - IMOVEIS
  state.imoveis.forEach(i => {
    linhas.push(`0040|${i.codigo}|BR|${i.descricao}|||||||10000`);
  });

  // 0050 - CONTAS
  state.contas.forEach(c => {
    linhas.push(`0050|${c.codigo}|BR|||||${c.descricao}`);
  });

  // Q100 - LANÇAMENTOS DO LIVRO CAIXA
  let saldoAcumulado = 0;
  sorted.forEach(l => {
    if (l.tipoLancamento === 1) saldoAcumulado += l.valor;
    else if (l.tipoLancamento === 2) saldoAcumulado -= l.valor;
    
    linhas.push(`Q100|${formatDataLCDPR(l.data)}|${l.codigoImovel}|${l.codigoConta}|||${l.historico.substring(0,240)}|${l.cpfCnpj}|${l.tipoLancamento}|${formatLCDPR(l.valor)}|${formatLCDPR(saldoAcumulado)}|${l.situacao}`);
  });

  // Q200 - RESUMO MENSAL CONSOLIDADO
  const mesesConsolidados = consolidarPorMes(state.lancamentos);
  mesesConsolidados.forEach(m => {
    linhas.push(`Q200|${m.mesAno}|${formatLCDPR(m.receitas)}|${formatLCDPR(m.despesas)}|${formatLCDPR(m.resultado)}|${m.tipo}`);
  });

  // 9999 - FECHAMENTO
  linhas.push(`9999||${linhas.length + 1}`);

  textGeradoOficial = linhas.join('\r\n');
  document.getElementById('txt-preview-content').textContent = textGeradoOficial;
  document.getElementById('export-preview-box').style.display = 'block';
  toast('Arquivo estruturado com sucesso!', 'success');
}

function fazerDownloadTXT() {
  if (!textGeradoOficial) return;
  const blob = new Blob([textGeradoOficial], {type: 'text/plain;charset=utf-8'});
  const el = document.createElement('a');
  el.href = URL.createObjectURL(blob);
  el.download = `LCDPR_${state.cpfProdutor}_${state.anoCalendario}.txt`;
  document.body.appendChild(el);
  el.click();
  document.body.removeChild(el);
}

// ============================================================
// CONSOLIDACAO MENSAL (Q200)
// ============================================================
function renderConsolidacao() {
  const {consolidado} = getStats();
  return `
    <div class="table-card">
      <div class="table-header">
        <h3>Resumo Mensal Consolidado (Bloco Q200)</h3>
      </div>
      <div style="overflow-x:auto">
        <table class="consol-table">
          <thead>
            <tr>
              <th>Período/Mês</th>
              <th>Entradas / Receitas</th>
              <th>Saídas / Despesas</th>
              <th>Resultado Líquido</th>
              <th style="text-align:center">Indicador</th>
              <th style="text-align:center">Registros</th>
            </tr>
          </thead>
          <tbody>
            ${consolidado.length === 0 ? `<tr><td colspan="6"><div class="empty-state"><p>Nenhum lançamento no período.</p></div></td></tr>` : consolidado.map(c => `
              <tr>
                <td><strong>${mesLabel(c.mesAno.slice(0,2))} / ${c.mesAno.slice(2)}</strong></td>
                <td class="receita-val">${formatBRL(c.receitas)}</td>
                <td class="despesa-val">${formatBRL(c.despesas)}</td>
                <td style="font-weight:700">${formatBRL(c.resultado)}</td>
                <td style="text-align:center"><span class="badge ${c.tipo==='P'?'badge-receita':'badge-despesa'}">${c.tipo==='P'?'Lucro (P)':'Prejuízo (N)'}</span></td>
                <td style="text-align:center;color:var(--text3)">${c.qtdLancamentos} mov.</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ============================================================
// DEMONSTRATIVO ANUAL DE RESULTADOS
// ============================================================
function renderDemonstrativo() {
  const {totalReceitas, totalDespesas, saldoAtual, consolidado} = getStats();
  return `
    <div class="summary-bar">
      <div class="sum-item"><div class="sl">Receitas Totais</div><div class="sv receita-val">${formatBRL(totalReceitas)}</div></div>
      <div class="sum-item"><div class="sl">Despesas Totais</div><div class="sv despesa-val">${formatBRL(totalDespesas)}</div></div>
      <div class="sum-item"><div class="sl">Resultado Operacional</div><div class="sv ${saldoAtual>=0?'receita-val':'despesa-val'}">${formatBRL(saldoAtual)}</div></div>
    </div>
    <div class="table-card">
      <div class="table-header">
        <h3>Fluxo Anual de Operações Rurais</h3>
        <button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ Imprimir Relatório</button>
      </div>
      <table class="report-table">
        <thead><tr><th>Mês Operação</th><th>Receitas (R$)</th><th>Despesas (R$)</th><th>Resultado Caixa</th></tr></thead>
        <tbody>
          ${['01','02','03','04','05','06','07','08','09','10','11','12'].map(m => {
            const c = consolidado.find(item => item.mesAno.substring(0,2) === m);
            const r = c ? c.receitas : 0;
            const d = c ? c.despesas : 0;
            const res = r - d;
            return `
              <tr>
                <td><strong>${mesLabel(m)}</strong></td>
                <td style="color:${r>0?'var(--success)':'var(--text2)'}">${formatBRL(r)}</td>
                <td style="color:${d>0?'var(--danger)':'var(--text2)'}">${formatBRL(d)}</td>
                <td class="${res>=0?'saldo-pos':'saldo-neg'}">${formatBRL(res)}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// ============================================================
// CONFIGURAÇÕES GERAIS DO SISTEMA
// ============================================================
function renderConfig() {
  return `
    <div class="tabs">
      <button class="tab-btn active" onclick="switchConfigTab(this, 'c-imoveis')">Imóveis Rurais (0040)</button>
      <button class="tab-btn" onclick="switchConfigTab(this, 'c-contas')">Contas Bancárias (0050)</button>
    </div>
    <div id="c-imoveis" class="config-subtab">
      <div class="form-section">
        <div class="form-section-title">Cadastrar Novo Imóvel Rural</div>
        <div class="form-grid">
          <div class="form-group"><label>Código Imóvel</label><input type="text" id="add-i-cod" class="form-control" placeholder="EX: IM004"></div>
          <div class="form-group"><label>Nome / Descrição</label><input type="text" id="add-i-desc" class="form-control" placeholder="Fazenda Nova Esperança"></div>
          <div class="form-group"><label>Município</label><input type="text" id="add-i-mun" class="form-control"></div>
          <div class="form-group"><label>UF</label><input type="text" id="add-i-uf" class="form-control" maxlength="2"></div>
        </div>
        <button class="btn btn-primary" style="margin-top:16px" onclick="adicionarImovel()">Adicionar Imóvel</button>
      </div>
      <div class="table-card">
        <table>
          <thead><tr><th>Código</th><th>Descrição / Nome</th><th>Município</th><th>UF</th><th>Ações</th></tr></thead>
          <tbody>
            ${state.imoveis.map(i => `<tr><td><strong>${i.codigo}</strong></td><td>${i.descricao}</td><td>${i.municipio}</td><td>${i.uf}</td><td><button class="btn btn-ghost btn-sm" onclick="removerImovel('${i.id}')">✕</button></td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div id="c-contas" class="config-subtab" style="display:none">
      <div class="form-section">
        <div class="form-section-title">Cadastrar Nova Conta Bancária</div>
        <div class="form-grid">
          <div class="form-group"><label>Código Conta</label><input type="text" id="add-c-cod" class="form-control" placeholder="EX: CC005"></div>
          <div class="form-group"><label>Descrição da Conta</label><input type="text" id="add-c-desc" class="form-control" placeholder="Itaú Agência Rural"></div>
        </div>
        <button class="btn btn-primary" style="margin-top:16px" onclick="adicionarConta()">Adicionar Conta</button>
      </div>
      <div class="table-card">
        <table>
          <thead><tr><th>Código</th><th>Descrição / Instituição</th><th>Ações</th></tr></thead>
          <tbody>
            ${state.contas.map(c => `<tr><td><strong>${c.codigo}</strong></td><td>${c.descricao}</td><td><button class="btn btn-ghost btn-sm" onclick="removerConta('${c.id}')">✕</button></td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function switchConfigTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.config-subtab').forEach(t => t.style.display = 'none');
  document.getElementById(tabId).style.display = 'block';
}

function adicionarImovel() {
  const codigo = document.getElementById('add-i-cod').value.trim().toUpperCase();
  const descricao = document.getElementById('add-i-desc').value.trim();
  const municipio = document.getElementById('add-i-mun').value.trim();
  const uf = document.getElementById('add-i-uf').value.trim().toUpperCase();

  if(!codigo || !descricao) { toast('Código e Descrição são campos obrigatórios.', 'error'); return; }
  state.imoveis.push({id: genId(), codigo, descricao, municipio, uf});
  saveState();
  toast('Imóvel rural adicionado com sucesso.', 'success');
  renderPage('config');
}

function removerImovel(id) {
  state.imoveis = state.imoveis.filter(i => i.id !== id);
  saveState();
  toast('Imóvel removido.', 'warning');
  renderPage('config');
}

function adicionarConta() {
  const codigo = document.getElementById('add-c-cod').value.trim().toUpperCase();
  const descricao = document.getElementById('add-c-desc').value.trim();

  if(!codigo || !descricao) { toast('Código e Descrição são campos obrigatórios.', 'error'); return; }
  state.contas.push({id: genId(), codigo, descricao});
  saveState();
  toast('Conta bancária cadastrada.', 'success');
  renderPage('config');
}

function removerConta(id) {
  state.contas = state.contas.filter(c => c.id !== id);
  saveState();
  toast('Conta bancária removida.', 'warning');
  renderPage('config');
}

// ============================================================
// COMPONENTES AUXILIARES: MODAL & TOAST
// ============================================================
function abrirModal(titulo, corpo, rodape) {
  document.getElementById('modal-title').textContent = titulo;
  document.getElementById('modal-body').innerHTML = corpo;
  document.getElementById('modal-footer').innerHTML = rodape;
  document.getElementById('modal-overlay').classList.add('open');
}

function fecharModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function toast(msg, tipo='info') {
  const el = document.createElement('div');
  el.className = `toast ${tipo}`;
  const icons = {success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  el.innerHTML = `<span>${icons[tipo]||'ℹ️'}</span> ${msg}`;
  const container = document.getElementById('toast-container');
  container.appendChild(el);
  setTimeout(()=>{
    el.style.opacity='0';
    el.style.transform='translateX(40px)';
    el.style.transition='all .3s';
    setTimeout(()=>el.remove(),300)
  }, 3000);
}

// ============================================================
// INICIALIZAÇÃO DA APLICAÇÃO
// ============================================================
loadState();
navigate('dashboard');
</script>
</body>
</html>
